name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binaries
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          for bin in memo tap prv cel when; do
            cp target/${{ matrix.target }}/release/$bin dist/ 2>/dev/null || true
          done
          cd dist
          tar czf ../nix-pipe-tools-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: nix-pipe-tools-${{ matrix.target }}
          path: nix-pipe-tools-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: nix-pipe-tools-*.tar.gz
          generate_release_notes: true

      - name: Trigger homebrew-tap update
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/kedoco/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[version]=$VERSION"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
